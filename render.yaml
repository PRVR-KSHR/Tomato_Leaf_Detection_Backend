services:
  - type: web
    name: tomato-disease-api
    env: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn --workers=1 --threads=2 --worker-class=sync --max-requests=100 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: HF_MODEL_URL
        value: https://huggingface.co/your-username/your-repo/resolve/main/ViTAgriNet_best.pth
