services:
  - type: web
    name: tomato-disease-api
    env: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: >
      curl https://pyenv.run | bash &&
      git lfs pull &&
      pip install --upgrade pip setuptools wheel &&
      pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
